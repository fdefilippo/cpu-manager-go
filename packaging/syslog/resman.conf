# File: /etc/rsyslog.d/resman-advanced.conf

# Configurazione avanzata per resman con supporto journald
module(load="imjournal" StateFile="imjournal.state")
module(load="omfile")

# Template migliorato per i log
template(name="ResManagerJsonFormat" type="list") {
    constant(value="{")
    constant(value="\"timestamp\":\"")
    property(name="timereported" dateFormat="rfc3339")
    constant(value="\",\"host\":\"")
    property(name="hostname")
    constant(value="\",\"tag\":\"resman\",\"severity\":\"")
    property(name="syslogseverity-text")
    constant(value="\",\"message\":\"")
    property(name="msg")
    constant(value="\"}\n")
}

# Template semplice (legacy)
template(name="ResManagerSimpleFormat" type="string"
         string="%timegenerated% %hostname% resman[%procid%]: %syslogseverity-text%: %msg%\n")

# Filtra i log di resman da più sorgenti
if ($programname == 'resman') or
   ($syslogtag startswith 'resman') or
   ($msg contains '"appname":"resman"') then {

    # Log in formato JSON (opzionale)
    # action(type="omfile"
    #        file="/var/log/resman.json"
    #        template="ResManagerJsonFormat"
    #        fileCreateMode="0640")

    # Log in formato testo semplice
    action(type="omfile"
           file="/var/log/resman.log"
           template="ResManagerSimpleFormat"
           fileCreateMode="0640"
           dirCreateMode="0755"
           createDirs="on"
           asyncWriting="on"
           flushInterval="1")

    # Interrompi l'elaborazione per evitare duplicati
    stop
}
